<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="screen-orientation" content="landscape">
    <title>Jennifer's Cruise Adventure 🚢</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container"></div>

    <!-- Debug Scene Selector -->
    <div id="debug-panel" style="
        position: fixed; top: 0; left: 0; z-index: 99999;
        background: rgba(0,0,0,0.85); padding: 6px 10px;
        font-family: 'Courier New', monospace; font-size: 12px;
        display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
    ">
        <span style="color: #FF69B4; font-weight: bold; margin-right: 6px;">DEBUG:</span>
        <button class="dbg-btn" onclick="goScene('TitleScene')">Title</button>
        <button class="dbg-btn" onclick="goScene('TeslaScene')">Tesla</button>
        <button class="dbg-btn" onclick="goScene('GameScene')">Game</button>
        <button class="dbg-btn" onclick="goScene('MemoryScene')">Memory</button>
        <button class="dbg-btn" onclick="goScene('ShooScene')">Shoo</button>
        <button class="dbg-btn" onclick="goScene('BossScene')">Boss</button>
        <button class="dbg-btn" onclick="goScene('VictoryScene')">Victory</button>
        <button class="dbg-btn" onclick="goScene('MusterScene')">Muster</button>
        <button class="dbg-btn" style="background:#555;color:#aaa;" onclick="document.getElementById('debug-panel').style.display='none'">✕</button>
    </div>
    <style>
        .dbg-btn {
            background: #333; color: #0f0; border: 1px solid #0f0;
            padding: 3px 8px; cursor: pointer; font-family: 'Courier New', monospace;
            font-size: 11px; border-radius: 3px;
        }
        .dbg-btn:hover { background: #0f0; color: #000; }
    </style>
    <script>
        function goScene(key) {
            if (typeof game === 'undefined') return;
            // Stop all active scenes, then start the target
            game.scene.getScenes(true).forEach(function(s) {
                game.scene.stop(s.scene.key);
            });
            // Remove any touch control overlays
            document.querySelectorAll('.touch-controls, .shoot-btn').forEach(function(el) { el.remove(); });
            game.scene.start(key);
        }
    </script>

    <!-- Rotate phone hint -->
    <div class="rotate-hint">
        <div class="phone-icon">📱</div>
        <div>Rotate your phone to landscape!</div>
    </div>

    <!-- Phaser 3 from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <!-- Sprite Generation -->
    <script src="js/sprites/SpriteGenerator.js"></script>

    <!-- Entities -->
    <script src="js/entities/Jennifer.js"></script>
    <script src="js/entities/Honey.js"></script>
    <script src="js/entities/Seagull.js"></script>

    <!-- UI -->
    <script src="js/ui/TouchControls.js"></script>

    <!-- Scenes -->
    <script src="js/scenes/BootScene.js"></script>
    <script src="js/scenes/TitleScene.js"></script>
    <script src="js/scenes/GameScene.js"></script>
    <script src="js/scenes/TeslaScene.js"></script>
    <script src="js/scenes/MemoryScene.js"></script>
    <script src="js/scenes/ShooScene.js"></script>
    <script src="js/scenes/MusterScene.js"></script>
    <script src="js/scenes/BossScene.js"></script>
    <script src="js/scenes/VictoryScene.js"></script>

    <!-- Game Config (starts the game) -->
    <script src="js/config.js"></script>
</body>
</html>
